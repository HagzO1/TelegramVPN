name: TelegramVPN
options:
  bundleIdPrefix: com.telegramvpn
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.7"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  TelegramVPN:
    type: application
    platform: iOS
    sources:
      - path: Sources/TelegramVPN
    settings:
      base:
        INFOPLIST_FILE: Sources/TelegramVPN/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.telegramvpn.app
        PRODUCT_NAME: TelegramVPN
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/TelegramVPN/Info.plist
