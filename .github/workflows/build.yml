name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild build \
            -project TelegramVPN.xcodeproj \
            -scheme TelegramVPN \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R "build/DerivedData/Build/Products/Release-iphoneos/TelegramVPN.app" "build/ipa/Payload/"
          cd build/ipa
          zip -r TelegramVPN.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TelegramVPN-ipa
          path: build/ipa/TelegramVPN.ipa
